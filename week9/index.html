<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Final Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Task Manager</h1>
        <p id="quote-display"></p>
        </header>
        <main>
            <section id="input-section">
                <input type="text" id="task-input" placeholder="Enter task title...">
                <select id="priority-input">
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                </select>
                <input type="date" id="date-input">
                <button id="add-btn">Add Task</button>
            </section>

            <section id="list-section">
                <div id="task-stats"></div>
                <ul id="task-list"></ul>
                <div id="controls">
                    <button id="clear-completed" onclick="clearCompleted()">Clear Completed</button>
                </div>
            </section>
          </main>

          <script src="script.js"></script>
        </body>
        </html>
